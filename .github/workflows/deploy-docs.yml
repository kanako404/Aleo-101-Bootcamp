name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'docs_v2/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install docs dependencies
        working-directory: docs
        run: npm install

      - name: Build docs
        working-directory: docs
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          BASE_PATH: /Aleo-101-Bootcamp
          NEXT_PUBLIC_BASE_PATH: /Aleo-101-Bootcamp

      - name: Install docs_v2 dependencies
        working-directory: docs_v2
        run: npm install

      - name: Build docs_v2
        working-directory: docs_v2
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          BASE_PATH: /Aleo-101-Bootcamp/v2
          NEXT_PUBLIC_BASE_PATH: /Aleo-101-Bootcamp/v2

      - name: Assemble Pages artifact
        run: |
          mkdir -p pages-artifact/v2
          cp -a docs/out/. pages-artifact/
          cp -a docs_v2/out/. pages-artifact/v2/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-artifact

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
